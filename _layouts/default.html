<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg: #fafafa;
      --fg: #1a1a1a;
      --fg-secondary: #444;
      --muted: #888;
      --border: #e5e5e5;
      --accent: #2563eb;
      --accent-dim: rgba(37, 99, 235, 0.06);
      --card-bg: #fff;
      --max-w: 680px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d0d0d;
        --fg: #e5e5e5;
        --fg-secondary: #aaa;
        --muted: #666;
        --border: #222;
        --accent: #60a5fa;
        --accent-dim: rgba(96, 165, 250, 0.07);
        --card-bg: #151515;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      padding: 2.5rem 1.25rem;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: var(--max-w); margin: 0 auto; }

    /* ── Header ── */
    header {
      margin-bottom: 2.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }
    header h1 a { color: var(--fg); text-decoration: none; }
    header p { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }

    /* ── Page title ── */
    .content h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }

    /* ── Tick label ── */
    .content h2 {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      padding: 0.35rem 0.65rem;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 5px;
      display: inline-block;
    }
    .content h1 + h2 { margin-top: 0; }

    /* ── Section heading (상세 페이지) ── */
    .content h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.4rem;
      letter-spacing: -0.01em;
      color: var(--fg);
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }
    .content h2 + h3 {
      border-top: none;
      padding-top: 0.5rem;
      margin-top: 0.75rem;
    }

    /* ── Body text ── */
    .content p {
      margin-bottom: 1rem;
      font-size: 0.93rem;
      color: var(--fg-secondary);
      line-height: 1.8;
    }

    /* ── Blockquote (요약) ── */
    .content blockquote {
      border-left: 2px solid var(--accent);
      padding: 0.6rem 1rem;
      margin: 0.75rem 0 1.5rem;
      background: var(--accent-dim);
      border-radius: 0 6px 6px 0;
      font-size: 0.88rem;
      color: var(--fg-secondary);
      font-weight: 400;
      line-height: 1.7;
    }
    .content blockquote p {
      margin-bottom: 0;
      color: var(--fg-secondary);
    }

    /* ── Links ── */
    .content a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.15s;
    }
    .content a:hover { text-decoration: underline; text-underline-offset: 3px; }

    /* ── Source link pill ── */
    .source-link {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.12rem 0.5rem;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 100px;
      color: var(--accent);
      text-decoration: none !important;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .source-link:hover {
      background: var(--accent);
      color: var(--bg);
    }

    /* ── Lists ── */
    .content ul, .content ol {
      margin: 0.5rem 0 1.25rem 1.2rem;
      font-size: 0.93rem;
    }
    .content li {
      margin-bottom: 0.5rem;
      line-height: 1.7;
      color: var(--fg-secondary);
    }
    .content li strong { font-weight: 600; color: var(--fg); }

    /* ── HR: hidden (Tick h2 handles separation) ── */
    .content hr { display: none; }

    /* ── Source tags ── */
    .tag {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      margin-right: 0.2rem;
      vertical-align: middle;
      line-height: 1.4;
    }
    .tag-x { background: #1d9bf0; color: #fff; }
    .tag-threads { background: #1a1a1a; color: #e5e5e5; border: 1px solid #555; }
    .tag-hn { background: #ff6600; color: #fff; }
    .tag-reddit { background: #ff4500; color: #fff; }
    .tag-rss { background: #f59e0b; color: #1a1a1a; }
    @media (prefers-color-scheme: light) {
      .tag-threads { background: #f0f0f0; color: #1a1a1a; border: 1px solid #ccc; }
    }

    /* ── Article card (목록) ── */
    .article-card {
      padding: 1rem 0 1rem 0.75rem;
      border-bottom: 1px solid var(--border);
      border-left: 2px solid transparent;
      transition: border-left-color 0.15s;
    }
    .article-card:last-child { border-bottom: none; }
    .article-card:hover { border-left-color: var(--accent); }
    .article-card h4 {
      font-size: 1.02rem;
      font-weight: 600;
      margin: 0.3rem 0 0.2rem;
      line-height: 1.5;
    }
    .article-card h4 a {
      color: var(--fg);
      text-decoration: none;
      transition: color 0.15s;
    }
    .article-card h4 a::after {
      content: " \2192";
      font-size: 0.8em;
      color: var(--muted);
      transition: color 0.15s;
    }
    .article-card h4 a:hover { color: var(--accent); }
    .article-card h4 a:hover::after { color: var(--accent); }
    .article-card .summary {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
      margin: 0;
    }

    /* ── Detail page: back link ── */
    .back-link {
      display: inline-block;
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none !important;
      margin-bottom: 1.5rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--accent); }

    /* ── Detail page: meta line (tags + time) ── */
    .meta-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── Detail page: context block ── */
    .context-block {
      margin: 2rem 0 1.5rem;
      padding: 0.85rem 1.1rem;
      border-left: 3px solid var(--muted);
      border-radius: 0 6px 6px 0;
      font-size: 0.85rem;
      line-height: 1.75;
      background: none;
    }
    .context-block h4 {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .context-block p {
      color: var(--fg-secondary);
      margin-bottom: 0.4rem;
      font-size: 0.85rem;
    }
    .context-block p:last-child { margin-bottom: 0; }

    /* ── Footer ── */
    footer {
      margin-top: 4rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* ── Index page: date card ── */
    a.date-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      color: var(--fg);
      text-decoration: none;
      transition: color 0.15s;
    }
    a.date-card:first-of-type { border-top: 1px solid var(--border); }
    a.date-card:hover { color: var(--accent); }
    a.date-card .date-label {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    a.date-card .date-arrow {
      font-size: 1rem;
      color: var(--muted);
      transition: color 0.15s;
    }
    a.date-card:hover .date-arrow { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="{{ '/' | relative_url }}">Claude Code Deep</a></h1>
      <p>Claude Code 활용 심화 — 3시간마다 자동 수집</p>
    </header>
    <main class="content">
      {{ content }}
    </main>
    <footer>
      <a href="https://github.com/wojacklabs/agentic-coding-news">GitHub</a> &middot; Powered by Claude Code
    </footer>
  </div>
</body>
</html>
